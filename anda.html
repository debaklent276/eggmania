<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EggMania - Fresh Eggs Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🥚 EggMania</h1>
    <p>Owned by Biswarup Biswas</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#cart">Cart 🛒 (<span id="count">0</span>)</a>
</nav>

<!-- SLIDER -->
<section class="slider">
    <img id="slideImg" src="https://images.unsplash.com/photo-1506976785307-8732e854ad03">
</section>

<h2 class="title" id="products">Our Eggs</h2>

<section class="products" id="productContainer">

    <div class="card">
        <h3>White Eggs (12 pcs)</h3>
        <p>₹90</p>
        <button onclick="addToCart('White Eggs',90)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Brown Eggs (12 pcs)</h3>
        <p>₹110</p>
        <button onclick="addToCart('Brown Eggs',110)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Organic Eggs (12 pcs)</h3>
        <p>₹140</p>
        <button onclick="addToCart('Organic Eggs',140)">Add to Cart</button>
    </div>

</section>

<!-- CART -->
<section id="cart">
    <h2>Your Cart</h2>
    <ul id="cartItems"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
    <button onclick="checkout()">Checkout</button>
</section>

<footer>
© 2026 EggMania | Owner: Biswarup Biswas
</footer>

<script src="script.js"></script>
</body>
</html>
